  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 {
      color: #2c3e50;
      border-bottom: 3px solid #667eea;
      padding-bottom: 15px;

    h2 {
      color: #34495e;
      margin: 30px 0 15px 0;
      font-size: 1.3em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    a {
      display: block;
      padding: 15px 20px;
      background: #f8f9fa;
      color: #2980b9;
      text-decoration: none;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      transition: all 0.3s;
      font-weight: 500;
    }
    a:hover {
      background: #667eea;
      color: white;
      transform: translateX(5px);
    }
  </style>
</head>
